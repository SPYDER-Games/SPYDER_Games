<!DOCTYPE html>
<html>
<head>
  <base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/clashofvikings/">

  <title>Clash Of Vikings</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <meta http-equiv="Content-type" content="text/html; charset=utf-8">

  <meta name="viewport"
        content="initial-scale=1.0001, minimum-scale=1.0001,
                 maximum-scale=1.0001, user-scalable=no, minimal-ui" />

  <meta name="apple-mobile-web-app-capable" content="yes" />

  <link rel="stylesheet" type="text/css" href="game.css">
  <link rel="shortcut icon" href="media/graphics/favicon.ico" />
  <script type="text/javascript" src="game.js"></script>
  <script type="text/javascript"
          src="https://s3.amazonaws.com/marketjs-us/en/patch/webaudio-context-patch.js"></script>

  <style>
    /* 🔙 BACK BUTTON */
    #backBtn {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 999999;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
      background: rgba(0,0,0,0.7);
      color: white;
      border: 2px solid white;
      border-radius: 4px;
    }
  </style>
</head>

<body onload="setTimeout(function(){window.scrollTo(0,1)},1);">

<!-- BACK BUTTON -->
<button id="backBtn" onclick="goHome()">⬅ Back</button>

<div class="gamecenter-activator"></div>

<div id="ajaxbar">
  <div id="game"><canvas id="canvas"></canvas></div>

  <div id="orientate">
    <img src="media/graphics/orientate/landscape.jpg" />
  </div>

  <div id="play" class="play">
    <img src="media/graphics/splash/mobile/cover-start.jpg" />
  </div>

  <!-- ads + other game HTML (unchanged) -->
</div>

<script>
  function goHome() {
    // This bypasses the <base href>
    const path = window.location.pathname;
    const folder = path.substring(0, path.lastIndexOf("/") + 1);
    window.location.href = window.location.origin + folder + "index.html";
  }
</script>

</body>
</html>
